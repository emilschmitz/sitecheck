services:
  # The Real Estate Due Diligence MCP Server
  mcp-sitecheck:
    build: .
    command: ["python", "mcp_server.py"]
    environment:
      - GCP_API_KEY=${GCP_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VISION_MODEL=${VISION_MODEL:-qwen/qwen-2.5-vl-7b-instruct}
    volumes:
      - ./data:/app/data

  # The A2A Subagent Server (Networked)
  a2a-server:
    build: .
    command: ["python", "a2a_server.py"]
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL:-qwen/qwen-2.5-72b-instruct}
      - GCP_API_KEY=${GCP_API_KEY}
    depends_on:
      - mcp-sitecheck
    volumes:
      - ./data:/app/data

  # A dedicated Bash MCP Server for terminal access
  mcp-bash:
    build: .
    command: ["python", "bash_mcp.py"]
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
