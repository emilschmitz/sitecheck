services:
  a2a:
    build: 
      context: .
      dockerfile: a2a_agent/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - a2a_agent/.env
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./a2a_agent:/app/a2a_agent
    command: ["uvicorn", "a2a_agent.server:app", "--host", "0.0.0.0", "--reload"]
  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - mcp_server/.env
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./mcp_server:/app/mcp_server
      - ./mcp_server/.env:/app/.env
    command: ["fastmcp", "run", "mcp_server/mcp_server/server.py", "--transport", "sse", "--port", "8001", "--host", "0.0.0.0", "--reload"]
