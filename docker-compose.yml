services:
  # The Real Estate Due Diligence MCP Server
  mcp-sitecheck:
    build: .
    environment:
      - GCP_API_KEY=${GCP_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VISION_MODEL=${VISION_MODEL:-qwen/qwen-2.5-vl-7b-instruct}
    volumes:
      - ./data:/app/data

  # The A2A Subagent Service (Self-contained Bash + SiteCheck)
  a2a-agent:
    build: .
    command: ["python", "-m", "a2a_agent.server"]
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL:-qwen/qwen-2.5-72b-instruct}
      - GCP_API_KEY=${GCP_API_KEY}
    depends_on:
      - mcp-sitecheck
    volumes:
      - .:/app
