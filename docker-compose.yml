services:
  # The A2A Subagent Service
  a2a:
    build: 
      context: ./a2a_agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL:-qwen/qwen3.5-flash-02-23}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://mcp:8001/sse}
    volumes:
      - ./data:/app/data

  # The MCP Server (Standalone)
  mcp:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - GCP_API_KEY=${GCP_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VISION_MODEL=${VISION_MODEL:-qwen/qwen3.5-flash-02-23}
    volumes:
      - ./data:/app/data
