services:
  a2a:
    build: 
      context: .
      dockerfile: a2a_agent/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EXTRACTION_MODEL=${EXTRACTION_MODEL}
      - MCP_SERVER_URL=http://mcp:8001/sse
    volumes:
      - ./data:/app/data
      - ./a2a_agent:/app/a2a_agent
    command: ["uvicorn", "a2a_agent.server:app", "--host", "0.0.0.0", "--reload"]
  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - GCP_API_KEY=${GCP_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VISION_MODEL=${VISION_MODEL}
    volumes:
      - ./data:/app/data
      - ./mcp_server:/app/mcp_server
    command: ["fastmcp", "run", "mcp_server/mcp_server/server.py", "--transport", "sse", "--port", "8001", "--reload"]
